<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Marquesitas App</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- NAVBAR -->
<div class="navbar">
  <div style="display:flex; align-items:center; gap:10px;">
           <img src="Imagen2.png" width="120">
    <img src="Imagen1.png" width="350">
  </div>

  <span>Total: $<span id="totalDia">0</span></span>
</div>

  <!-- CONTENIDO -->
  <div class="contenido">

    <!-- PANEL IZQUIERDO -->
    <div class="menu">
      <h3>Ingredientes</h3>

      <label><input type="checkbox" value="Nutella"> Nutella ($20)</label>
      <label><input type="checkbox" value="Queso"> Queso ($15)</label>
      <label><input type="checkbox" value="Lechera"> Lechera ($10)</label>
      <label><input type="checkbox" value="Fresa"> Fresa ($12)</label>

      <input id="direccion" placeholder="Dirección del cliente">

      <button onclick="confirmar()">Hacer pedido</button>
    </div>

    <!-- PANEL DERECHO -->
    <div class="pedidos">
      <h3>Pedidos en tiempo real</h3>
      <ul id="lista"></ul>
    </div>

    <div class="chatbot">
  <h3>💬 Chatbot</h3>
  <div id="chatbox"></div>
  <input id="mensaje" placeholder="Escribe aquí...">
  <button onclick="enviar()">Enviar</button>
</div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
