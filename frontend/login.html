<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body style="background:#ffe4ec; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

<div style="background:white; padding:30px; border-radius:20px; text-align:center; width:300px;">
  
  <h2>💖 Login</h2>

  <input id="user" placeholder="Usuario" style="margin:10px; padding:10px; width:90%; border-radius:10px;">
  <input id="pass" type="password" placeholder="Contraseña" style="margin:10px; padding:10px; width:90%; border-radius:10px;">

  <button onclick="login()" style="padding:10px; border:none; border-radius:10px; background:#ff4d88; color:white;">
    Entrar
  </button>

</div>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "1234"){
    window.location.href = "index.html";
  } else {
    alert("Datos incorrectos");
  }
}
</script>

</body>
</html>
