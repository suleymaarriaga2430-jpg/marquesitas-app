<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquesitas App</title>

  <!-- ✅ RUTA CORRECTA -->
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="app">

  <!-- NAVBAR -->
  <div class="navbar">
  <h2>🧁 Marquesitas</h2>

  <div class="nav-right">
    <span>Total del día: $<span id="totalDia">0</span></span>
    <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="contenido">

    <!-- INGREDIENTES -->
    <div class="menu">

      <h3>Arma tu marquesita</h3>

      <div class="ingredientes-grid">

        <label class="card">
          <input type="checkbox" value="Nutella">
          <div class="emoji">🍫</div>
          <h4>Nutella</h4>
          <p>$20</p>
        </label>

        <label class="card">
          <input type="checkbox" value="Queso">
          <div class="emoji">🧀</div>
          <h4>Queso</h4>
          <p>$15</p>
        </label>

        <label class="card">
          <input type="checkbox" value="Lechera">
          <div class="emoji">🥛</div>
          <h4>Lechera</h4>
          <p>$10</p>
        </label>

        <label class="card">
          <input type="checkbox" value="Fresa">
          <div class="emoji">🍓</div>
          <h4>Fresa</h4>
          <p>$12</p>
        </label>

      </div>

      <input id="direccion" placeholder="📍 Dirección de entrega">
      <input id="telefono" placeholder="📞 Número de teléfono">

      <!-- 🔥 NUEVO -->
      <div class="preview-box">
        <p><b>Tu pedido:</b></p>
        <p id="previewPedido">Nada aún</p>
      </div>

      <button class="btn-pedir" onclick="confirmar()">
        🚀 Hacer pedido
      </button>

    </div>

    <!-- PEDIDOS -->
    <div class="pedidos">
      <h3>Pedidos</h3>
      <ul id="lista"></ul>
    </div>

  </div>

  <!-- CHAT -->
  <div class="chatbot">
    <h3>💬 Asistente</h3>
    <div id="chatbox"></div>
    <input id="mensaje" placeholder="Escribe...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script src="../js/app.js"></script>
</body>
</html>
